<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Posts - Posting</title>
</head>
<body>
    <h1>Posts</h1>
    <a th:href="@{/posts/create}">New Post</a> | <a th:href="@{/}">Home</a>
    <hr/>
    <table th:if="${not #lists.isEmpty(posts)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Created</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="post : ${posts}">
                <td th:text="${post.id}">1</td>
                <td><a th:href="@{'/posts/' + ${post.id}}" th:text="${post.title}">title</a></td>
                <td th:text="${post.createdAt.toLocalDate()}">2026-01-01</td>
            </tr>
        </tbody>
    </table>
    <p th:unless="${#lists.isEmpty(posts)}">No posts yet.</p>
</body>
</html>
