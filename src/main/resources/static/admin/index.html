<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>admin</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 960px; margin: auto; padding: 1rem; }
section { margin-top: 2rem; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: .5rem; text-align: left; border-bottom: 1px solid #ddd; }
th { background: #f5f5f5; }
form { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
input { padding: .4rem; border: 1px solid #ccc; border-radius: 4px; }
button { padding: .4rem .8rem; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
button.danger { background: #dc3545; }
.preview { font-size: .85rem; color: #666; margin-bottom: 1rem; }
</style>
<h1>Admin</h1>
<p class="preview">assignment preview — quick admin panel</p>

<section id="users-section">
<h2>Users</h2>
<form id="user-form">
<input name="username" placeholder="username" required>
<input name="nickname" placeholder="nickname" required>
<button type="submit">add</button>
</form>
<table id="user-table"><thead><tr><th>ID</th><th>Username</th><th>Nickname</th><th>Created</th><th></th></tr></thead><tbody></tbody></table>
</section>

<section id="posts-section">
<h2>Posts</h2>
<form id="post-form">
<input name="title" placeholder="title" required>
<textarea name="content" rows="3" placeholder="content" required></textarea>
<input name="authorId" type="number" placeholder="author ID" required>
<button type="submit">add</button>
</form>
<table id="post-table"><thead><tr><th>ID</th><th>Title</th><th>Author</th><th>Updated</th><th></th></tr></thead><tbody></tbody></table>
</section>

<script>
const API = window.location.origin + "/api"

async function loadUsers() {
  const res = await fetch(API + "/users")
  const users = await res.json()
  document.querySelector("#user-table tbody").innerHTML = users.map(u => `
    <tr>
      <td>${u.id}</td>
      <td>${u.username}</td>
      <td>${u.nickname}</td>
      <td>${u.createdAt}</td>
      <td><button class="danger" onclick="deleteUser(${u.id})">x</button></td>
    </tr>`).join("")
}

async function deleteUser(id) {
  await fetch(API + "/users/" + id, { method: "DELETE" })
  loadUsers()
}

document.querySelector("#user-form").addEventListener("submit", async e => {
  e.preventDefault()
  const fd = new FormData(e.target)
  await fetch(API + "/users", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(Object.fromEntries(fd))
  })
  e.target.reset()
  loadUsers()
})

async function loadPosts() {
  const res = await fetch(API + "/posts")
  const posts = await res.json()
  document.querySelector("#post-table tbody").innerHTML = posts.map(p => `
    <tr>
      <td>${p.id}</td>
      <td>${p.title}</td>
      <td>${p.authorId}</td>
      <td>${p.updatedAt}</td>
      <td><button class="danger" onclick="deletePost(${p.id})">x</button></td>
    </tr>`).join("")
}

async function deletePost(id) {
  await fetch(API + "/posts/" + id, { method: "DELETE" })
  loadPosts()
}

document.querySelector("#post-form").addEventListener("submit", async e => {
  e.preventDefault()
  const fd = new FormData(e.target)
  const body = {
    title: fd.get("title"),
    content: fd.get("content"),
    authorId: Number(fd.get("authorId"))
  }
  await fetch(API + "/posts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  })
  e.target.reset()
  loadPosts()
})

loadUsers()
loadPosts()
</script>
